<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSSE CAFE メニュー</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#fbf9f4] text-[#2c3a3f]">
    <header class="bg-[#95bdcc] shadow-sm px-6 py-4 text-center md:text-left">
      <h1 class="text-2xl font-bold text-gray-900">POSSE CAFE</h1>
      <p class="text-gray-600 text-sm mt-1">東京・渋谷のスペシャルティコーヒーショップ</p>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
      <section class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-4">ドリンク</h2>

        <div class="bg-[#f5d6b3] rounded-lg shadow p-6 mb-4 transition-colors duration-200 hover:bg-[#e6c198] cursor-pointer">
          <h3 class="text-lg font-bold text-[#704d3d]">ブレンドコーヒー</h3>
          <p class="text-gray-600 mt-1">本日のおすすめ。深みとコクが特徴です。</p>
          <p class="text-blue-600 font-bold mt-2">600円</p>
        </div>

        <div class="bg-[#f5d6b3] rounded-lg shadow p-6 mb-4 transition-colors duration-200 hover:bg-[#e6c198] cursor-pointer">
          <h3 class="text-lg font-bold text-[#704d3d]">カフェラテ</h3>
          <p class="text-gray-600 mt-1">なめらかなミルクとエスプレッソのバランス。</p>
          <p class="text-blue-600 font-bold mt-2">700円</p>
        </div>
      </section>
    </main>

    <footer class="bg-[#fbf9f4] text-center py-6 text-gray-500 text-sm">
      <p>2024 POSSE CAFE</p>
    </footer>
  </body>
</html>
